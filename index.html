<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Khảo sát AR - Sensory Marketing</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f4f4f4; font-family: sans-serif; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
        .instructions { padding: 10px; text-align: center; background: #000; color: #fff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="instructions">Xoay và phóng to để quan sát các chi tiết của sản phẩm. Nhấn nút bên dưới để đặt chiếc túi lên sàn nhà hoặc mặt bàn của bạn.</div>

    <model-viewer 
        src="lether_bag fix .glb" 
        ios-src="lether_bag fix .usdz"
        alt="Túi da cao cấp"
        shadow-intensity="1" 
        camera-controls 
        auto-rotate 
        ar 
        ar-modes="webxr scene-viewer quick-look">
        
        <button slot="ar-button" style="background-color: red !important; color: white !important; border-radius: 10px !important; border: 3px solid black !important; position: absolute !important; bottom: 150px !important; left: 50% !important; transform: translateX(-50%) !important; padding: 20px 40px !important; font-weight: bold !important; font-size: 22px !important; white-space: nowrap !important; z-index: 9999 !important;">
          👜 XEM TRONG KHÔNG GIAN THỰC (AR)
        </button>
    </model-viewer>
</body>
</html>
